<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vertex 1.6 — By Groq</title>
<link rel="icon" href="img/logo.png">
<link rel="apple-touch-icon" href="img/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08080d;
  --surface:#101019;
  --surface2:#171722;
  --surface3:#20202c;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.14);
  --text:#eeeef6;
  --text2:#9696ac;
  --text3:#55556b;
  --accent:#7c6cff;
  --accent2:#a196ff;
  --cyan:#5eead4;
  --accent-bg:rgba(124,108,255,0.12);
  --accent-bg2:rgba(124,108,255,0.06);
  --gradient:linear-gradient(135deg,#7c6cff 0%,#5eead4 100%);
  --gradient-soft:linear-gradient(135deg,rgba(124,108,255,0.16),rgba(94,234,212,0.10));
  --gradient-text:linear-gradient(135deg,#a196ff 10%,#5eead4 90%);
  --green:#34d399;
  --red:#f87171;
  --yellow:#fbbf24;
  --font-display:'Space Grotesk',sans-serif;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;height:100vh;height:100dvh;position:relative}
@media(prefers-reduced-motion:reduce){*{animation-duration:0.001ms!important;animation-iteration-count:1!important;transition-duration:0.001ms!important}}

/* ════════════════════════════════
   AMBIENT BACKGROUND
════════════════════════════════ */
.bg-ambient{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.16}
.bg-blob.b1{width:520px;height:520px;top:-160px;left:-120px;background:var(--accent);animation:drift1 26s ease-in-out infinite}
.bg-blob.b2{width:460px;height:460px;bottom:-140px;right:-100px;background:var(--cyan);animation:drift2 32s ease-in-out infinite}
.bg-blob.b3{width:340px;height:340px;top:40%;left:38%;background:#5e5eff;opacity:0.08;animation:drift3 40s ease-in-out infinite}
@keyframes drift1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(60px,40px) scale(1.08)}}
@keyframes drift2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-50px,-30px) scale(1.1)}}
@keyframes drift3{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,50px)}}

/* ════════════════════════════════
   VERTEX MARK (signature logo)
════════════════════════════════ */
.vertex-mark{position:relative;display:flex;align-items:center;justify-content:center}
.vertex-mark svg{display:block}
.vertex-mark .vnode{animation:vnodepulse 2.6s ease-in-out infinite}
.vertex-mark .vnode:nth-child(2){animation-delay:.5s}
.vertex-mark .vnode:nth-child(3){animation-delay:1s}
@keyframes vnodepulse{0%,100%{opacity:1}50%{opacity:0.45}}
.vertex-mark .vline{stroke-dasharray:40;animation:vdash 3.2s linear infinite}
@keyframes vdash{to{stroke-dashoffset:-80}}

/* ════════════════════════════════
   DESKTOP LAYOUT
════════════════════════════════ */
.sidebar{
  width:264px;min-width:264px;
  background:rgba(16,16,25,0.88);
  backdrop-filter:blur(18px);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  transition:width 0.3s cubic-bezier(.4,0,.2,1),min-width 0.3s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
  position:relative;z-index:10;
}
.sidebar.collapsed{width:0;min-width:0;border-right:none}
.sidebar-overlay{display:none}

.sidebar-header{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;white-space:nowrap;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15.5px;font-family:var(--font-display);letter-spacing:0.01em}
.logo-icon{width:30px;height:30px;flex-shrink:0}
.logo-text-grad{background:var(--gradient-text);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-close{display:none;background:none;border:none;color:var(--text2);cursor:pointer;padding:6px;border-radius:7px}

.new-chat-btn{margin:12px 12px 8px;display:flex;align-items:center;gap:8px;padding:11px 14px;background:var(--gradient-soft);border:1px solid rgba(124,108,255,0.28);border-radius:12px;color:var(--accent2);font-family:var(--font);font-size:13.5px;font-weight:600;cursor:pointer;transition:all 0.22s cubic-bezier(.4,0,.2,1);white-space:nowrap;flex-shrink:0;position:relative;overflow:hidden}
.new-chat-btn::before{content:'';position:absolute;inset:0;background:var(--gradient);opacity:0;transition:opacity .22s}
.new-chat-btn:hover{color:#fff;border-color:transparent;transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,108,255,0.25)}
.new-chat-btn:hover::before{opacity:1}
.new-chat-btn:active{transform:translateY(0) scale(0.98)}
.new-chat-btn svg,.new-chat-btn span{position:relative;z-index:1}
.new-chat-btn svg{flex-shrink:0}

.sidebar-section{padding:14px 16px 6px;font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.11em;white-space:nowrap;flex-shrink:0;font-family:var(--font-display)}
.chat-list{flex:1;overflow-y:auto;padding:4px 10px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.chat-list::-webkit-scrollbar{width:3px}
.chat-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.chat-item{display:flex;align-items:center;gap:9px;padding:10px 11px;border-radius:10px;cursor:pointer;transition:all 0.18s;border:1px solid transparent;white-space:nowrap;animation:itemIn 0.35s ease both}
@keyframes itemIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
.chat-item:hover{background:var(--surface2);transform:translateX(2px)}
.chat-item.active{background:var(--accent-bg2);border-color:rgba(124,108,255,0.22)}
.chat-item.active::before{content:'';width:3px;height:16px;background:var(--gradient);border-radius:2px;margin-right:-2px}
.chat-item-icon{font-size:13px;opacity:0.55;flex-shrink:0}
.chat-item-body{flex:1;min-width:0}
.chat-item-title{font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis}
.chat-item.active .chat-item-title{color:var(--accent2);font-weight:500}
.chat-item-meta{font-size:11px;color:var(--text3);margin-top:1px;font-family:var(--mono)}
.chat-del{opacity:0;background:none;border:none;color:var(--text3);cursor:pointer;padding:4px 6px;border-radius:6px;font-size:12px;transition:all 0.15s;flex-shrink:0}
.chat-item:hover .chat-del{opacity:1}
.chat-del:hover{color:var(--red);background:rgba(248,113,113,0.12)}
.empty-list{padding:26px 14px;text-align:center;color:var(--text3);font-size:12.5px;line-height:1.7}

.sidebar-footer{padding:14px 12px;border-top:1px solid var(--border);flex-shrink:0}
.model-pill{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:11px;font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;font-family:var(--mono)}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;flex-shrink:0;box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;position:relative;z-index:1}

.topbar{padding:13px 18px;border-bottom:1px solid var(--border);background:rgba(16,16,25,0.72);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:space-between;min-height:56px;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.icon-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:7px;border-radius:9px;display:flex;align-items:center;justify-content:center;transition:all 0.18s cubic-bezier(.4,0,.2,1);flex-shrink:0;touch-action:manipulation}
.icon-btn:hover{background:var(--surface2);color:var(--text);transform:translateY(-1px)}
.icon-btn:active{background:var(--surface3);color:var(--text);transform:scale(0.94)}
.chat-title{font-size:14.5px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--font-display)}
.topbar-right{display:flex;align-items:center;gap:2px;flex-shrink:0}

/* SYS PANEL */
.sys-panel{background:rgba(23,23,34,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 18px;display:none;flex-shrink:0;animation:panelIn 0.25s ease}
@keyframes panelIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.sys-panel.open{display:block}
.sys-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:7px;font-family:var(--font-display)}
.sys-textarea{width:100%;max-width:760px;display:block;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:11px 14px;font-family:var(--font);font-size:13px;color:var(--text);resize:none;outline:none;line-height:1.65;transition:border-color 0.2s,box-shadow 0.2s}
.sys-textarea:focus{border-color:rgba(124,108,255,0.55);box-shadow:0 0 0 3px rgba(124,108,255,0.08)}
.sys-textarea::placeholder{color:var(--text3)}
.sys-settings{display:flex;align-items:center;gap:12px;max-width:760px;margin-top:12px;font-size:12.5px;color:var(--text2);flex-wrap:wrap}
.sys-settings label{display:flex;align-items:center;gap:8px;white-space:nowrap}
.temp-slider{flex:1;min-width:80px;accent-color:var(--accent);cursor:pointer}
.temp-val{font-family:var(--mono);font-size:12px;color:var(--accent2);min-width:28px}
.max-tok-input{width:74px;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:5px 8px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;text-align:center;transition:border-color .2s}
.max-tok-input:focus{border-color:rgba(124,108,255,0.55)}

/* MESSAGES */
.messages{flex:1;overflow-y:auto;scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:var(--border) transparent;-webkit-overflow-scrolling:touch}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Welcome */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:32px 20px;text-align:center;animation:welcomeIn 0.5s cubic-bezier(.2,.8,.2,1)}
@keyframes welcomeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.welcome-icon{width:64px;height:64px;border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:22px;background:var(--gradient-soft);border:1px solid rgba(124,108,255,0.25);box-shadow:0 0 60px rgba(124,108,255,0.22)}
.welcome h1{font-size:23px;font-weight:600;margin-bottom:9px;font-family:var(--font-display);background:var(--gradient-text);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:0.01em}
.welcome p{font-size:14px;color:var(--text2);line-height:1.65;max-width:380px;margin-bottom:28px}
.suggestions{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:500px}
.sug-btn{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px 15px;text-align:left;cursor:pointer;transition:all 0.25s cubic-bezier(.4,0,.2,1);font-family:var(--font);touch-action:manipulation;position:relative;overflow:hidden;opacity:0;animation:sugIn 0.45s ease forwards}
.sug-btn:nth-child(1){animation-delay:.05s}.sug-btn:nth-child(2){animation-delay:.12s}.sug-btn:nth-child(3){animation-delay:.19s}.sug-btn:nth-child(4){animation-delay:.26s}
@keyframes sugIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sug-btn::before{content:'';position:absolute;inset:0;border-radius:13px;padding:1px;background:var(--gradient);opacity:0;transition:opacity .25s;-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.sug-btn:hover{background:var(--surface2);border-color:transparent;transform:translateY(-2px);box-shadow:0 10px 26px rgba(0,0,0,0.35)}
.sug-btn:hover::before{opacity:1}
.sug-btn:active{transform:scale(0.97)}
.sug-icon{font-size:17px;margin-bottom:6px}
.sug-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.sug-desc{font-size:11.5px;color:var(--text3)}

/* Messages */
.msg-wrap{padding:18px 0;border-bottom:1px solid rgba(255,255,255,0.03);animation:msgIn 0.35s cubic-bezier(.2,.8,.2,1)}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-wrap:last-child{border-bottom:none}
.msg{max-width:760px;margin:0 auto;padding:0 18px;display:flex;gap:12px}
.msg-avatar{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:1px}
.msg-avatar.user{background:var(--surface3);color:var(--text2);border:1px solid var(--border)}
.msg-avatar.assistant{background:var(--gradient);color:#fff;box-shadow:0 2px 12px rgba(124,108,255,0.35)}
.msg-body{flex:1;min-width:0}
.msg-header{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.msg-name{font-size:13px;font-weight:600;color:var(--text);font-family:var(--font-display)}
.msg-time{font-size:11px;color:var(--text3)}
.msg-tokens{font-size:11px;color:var(--text3);font-family:var(--mono)}
.msg-content{font-size:14.5px;line-height:1.8;color:var(--text);word-wrap:break-word;overflow-wrap:break-word}
.msg-content p{margin-bottom:11px}
.msg-content p:last-child{margin-bottom:0}
.msg-content strong{font-weight:600}
.msg-content em{color:var(--text2)}
.msg-content code{font-family:var(--mono);font-size:12.5px;background:var(--surface2);border:1px solid var(--border);padding:1px 6px;border-radius:5px;color:var(--cyan)}
.msg-content pre{background:var(--surface2);border:1px solid var(--border);border-radius:12px;margin:13px 0;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:9px 15px;border-bottom:1px solid var(--border);font-size:11.5px;color:var(--text3);font-family:var(--mono)}
.copy-code-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-family:var(--font);font-size:11.5px;padding:3px 9px;border-radius:5px;transition:all 0.15s;touch-action:manipulation}
.copy-code-btn:hover{background:var(--surface3);color:var(--cyan)}
.msg-content pre code{display:block;padding:15px;font-size:13px;color:var(--text);background:none;border:none;line-height:1.68;overflow-x:auto}
.msg-content ul,.msg-content ol{padding-left:22px;margin:9px 0}
.msg-content li{margin-bottom:5px}
.msg-content h1,.msg-content h2,.msg-content h3{font-weight:600;margin:16px 0 7px;font-family:var(--font-display)}
.msg-content h1{font-size:19px}.msg-content h2{font-size:16.5px}.msg-content h3{font-size:15px}
.msg-content blockquote{border-left:3px solid var(--accent);padding-left:15px;color:var(--text2);margin:9px 0;font-style:italic}
.msg-content hr{border:none;border-top:1px solid var(--border);margin:15px 0}
.msg-content table{width:100%;border-collapse:collapse;margin:11px 0;font-size:13px;display:block;overflow-x:auto}
.msg-content th{background:var(--surface2);padding:8px 12px;text-align:left;border:1px solid var(--border);font-weight:600}
.msg-content td{padding:7px 12px;border:1px solid var(--border)}
.msg-actions{display:flex;gap:6px;margin-top:9px;opacity:0;transition:opacity 0.2s}
.msg-wrap:hover .msg-actions{opacity:1}
.action-btn{background:none;border:1px solid var(--border);color:var(--text3);cursor:pointer;padding:5px 10px;border-radius:7px;font-size:11.5px;font-family:var(--font);transition:all 0.18s;display:flex;align-items:center;gap:4px;touch-action:manipulation}
.action-btn:hover{background:var(--surface2);color:var(--accent2);border-color:rgba(124,108,255,0.3)}

/* Typing */
.typing{display:flex;align-items:center;gap:4px;padding:4px 0}
.typing-dot{width:6px;height:6px;background:var(--gradient);border-radius:50%;animation:tdot 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-5px);opacity:1}}

/* INPUT */
.input-area{padding:14px 18px;padding-bottom:calc(14px + var(--safe-bottom));border-top:1px solid var(--border);background:rgba(16,16,25,0.72);backdrop-filter:blur(14px);flex-shrink:0}
.input-inner{max-width:760px;margin:0 auto}
.input-box{background:var(--surface2);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color 0.2s,box-shadow 0.2s}
.input-box:focus-within{border-color:rgba(124,108,255,0.5);box-shadow:0 0 0 3px rgba(124,108,255,0.08),0 8px 24px rgba(0,0,0,0.25)}
textarea{width:100%;background:transparent;border:none;outline:none;padding:14px 15px 9px;font-family:var(--font);font-size:15px;color:var(--text);resize:none;line-height:1.6;max-height:160px;display:block;-webkit-appearance:none}
textarea::placeholder{color:var(--text3)}
.input-footer{display:flex;align-items:center;justify-content:space-between;padding:7px 13px 11px;gap:8px}
.input-hint{font-size:11px;color:var(--text3)}
.send-btn{background:var(--gradient);border:none;color:#fff;width:38px;height:38px;border-radius:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.22s cubic-bezier(.4,0,.2,1);flex-shrink:0;touch-action:manipulation;box-shadow:0 2px 12px rgba(124,108,255,0.3)}
.send-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 18px rgba(124,108,255,0.45)}
.send-btn:active:not(:disabled){transform:scale(0.94)}
.send-btn:disabled{opacity:0.35;cursor:not-allowed}
.send-btn.stop{background:rgba(248,113,113,0.18);border:1px solid rgba(248,113,113,0.35);color:var(--red);box-shadow:none}
.send-btn.stop:hover{background:rgba(248,113,113,0.28)}

/* TOAST */
.toast{position:fixed;bottom:calc(84px + var(--safe-bottom));right:18px;background:var(--surface2);border:1px solid var(--border2);border-radius:11px;padding:11px 16px;font-size:13px;color:var(--text);z-index:9999;animation:toastIn 0.35s cubic-bezier(.2,.8,.2,1);pointer-events:none;box-shadow:0 8px 28px rgba(0,0,0,0.45)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}


/* ════════════════════════════════
   MOBILE OVERRIDES
   Sidebar vira drawer com overlay
════════════════════════════════ */
body.is-mobile .sidebar{
  position:fixed;
  top:0;left:0;bottom:0;
  width:82vw;max-width:300px;
  min-width:unset;
  z-index:200;
  transform:translateX(-105%);
  transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
  border-right:1px solid var(--border2);
  box-shadow:4px 0 40px rgba(0,0,0,0.55);
  padding-top:var(--safe-top);
}
body.is-mobile .sidebar.open{
  transform:translateX(0);
}
body.is-mobile .sidebar.collapsed{
  width:82vw;max-width:300px;min-width:unset;
  transform:translateX(-105%);
}
body.is-mobile .sidebar-overlay{
  display:block;
  position:fixed;inset:0;
  background:rgba(0,0,0,0.6);
  z-index:199;
  opacity:0;pointer-events:none;
  transition:opacity 0.35s;
  backdrop-filter:blur(3px);
}
body.is-mobile .sidebar-overlay.visible{
  opacity:1;pointer-events:all;
}
body.is-mobile .sidebar-close{
  display:flex;align-items:center;justify-content:center;
}
body.is-mobile .main{
  width:100%;
}
body.is-mobile .topbar{
  padding:10px 12px;
  padding-top:calc(10px + var(--safe-top));
  min-height:calc(50px + var(--safe-top));
}
body.is-mobile .chat-title{
  font-size:15px;
}
body.is-mobile .msg{
  padding:0 12px;
  gap:9px;
}
body.is-mobile .msg-content{

<script>

const BACKEND = 'https://vertex.joaopedro2012fl.workers.dev';
const MODEL = 'llama-3.3-70b-versatile';
let chats = JSON.parse(localStorage.getItem('groq_chats') || '[]');
let cid = null;
let streaming = false;
let abrt = null;

/* ── DEVICE DETECTION ── */
const IS_MOBILE = /Android|iPhone|iPad|iPod|HarmonyOS|HMSCore|MIUI|XiaoMi|Redmi|OPPO|vivo|realme|OnePlus|Huawei|Samsung|Mobile|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
  || (navigator.maxTouchPoints > 1 && !/Macintosh/.test(navigator.userAgent))
  || window.innerWidth <= 768;

if(IS_MOBILE) document.body.classList.add('is-mobile');

/* ── SIDEBAR CONTROL ── */
function toggleSidebar(){
  if(IS_MOBILE){
    const open = document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('visible', open);
  } else {
    document.getElementById('sidebar').classList.toggle('collapsed');
  }
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
}

/* ── INIT ── */
(function init(){
  renderList();
  // Fecha sidebar com swipe no mobile
  if(IS_MOBILE) initSwipe();
})();

function initSwipe(){
  let startX = 0;
  let startY = 0;
  document.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, {passive:true});
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = Math.abs(e.changedTouches[0].clientY - startY);
    if(dy > 60) return; // movimento vertical, ignora
    const sidebar = document.getElementById('sidebar');
    if(dx > 50 && startX < 24 && !sidebar.classList.contains('open')){
      // swipe da esquerda para abrir
      sidebar.classList.add('open');
      document.getElementById('overlay').classList.add('visible');
    } else if(dx < -50 && sidebar.classList.contains('open')){
      closeSidebar();
    }
  }, {passive:true});
}

/* ── CHAT MGMT ── */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6) }

function newChat(){
  closeSidebar();
  const c = {id:uid(), title:'Novo chat', messages:[], createdAt:Date.now()};
  chats.unshift(c);
  cid = c.id;
  saveChats();
  renderList();
  renderMessages();
  document.getElementById('chatTitle').textContent = 'Novo chat';
  setTimeout(()=>document.getElementById('msgInput').focus(), 100);
}

function loadChat(id){
  cid = id;
  const c = getChat();
  if(c){
    document.getElementById('chatTitle').textContent = c.title;
    renderMessages();
    renderList();
  }
  closeSidebar();
}

function deleteChat(id, e){
  e.stopPropagation();
  chats = chats.filter(c => c.id !== id);
  if(cid === id){
    cid = null;
    document.getElementById('chatTitle').textContent = 'Novo chat';
    renderMessages();
  }
  saveChats();
  renderList();
  toast('Chat deletado');
}

function saveChats(){ localStorage.setItem('groq_chats', JSON.stringify(chats)) }
function getChat(){ return chats.find(c => c.id === cid) }

/* ── RENDER LIST ── */
function renderList(){
  const el = document.getElementById('chatList');
  if(!chats.length){
    el.innerHTML = '<div class="empty-list">Nenhum chat ainda.<br>Toque em "Novo chat" para começar.</div>';
    return;
  }
  el.innerHTML = chats.map(c => `
    <div class="chat-item ${c.id===cid?'active':''}" onclick="loadChat('${c.id}')">
      <span class="chat-item-icon">💬</span>
      <div class="chat-item-body">
        <div class="chat-item-title">${esc(c.title)}</div>
        <div class="chat-item-meta">${c.messages.length} msg${c.messages.length!==1?'s':''}</div>
      </div>
      <button class="chat-del" onclick="deleteChat('${c.id}',event)" title="Deletar">✕</button>
    </div>
  `).join('');
}

/* ── RENDER MESSAGES ── */
function renderMessages(){
  const c = getChat();
  const area = document.getElementById('messages');
  if(!c || !c.messages.length){
    area.innerHTML = welcomeHTML();
    return;
  }
  area.innerHTML = c.messages.map((m,i) => msgHTML(m,i)).join('');
  scrollBottom();
}

function welcomeHTML(){
  return `<div class="welcome" id="welcome">
    <div class="welcome-icon vertex-mark">
      <svg width="32" height="32" viewBox="0 0 30 30" fill="none">
        <defs>
          <linearGradient id="vg3" x1="0" y1="0" x2="30" y2="30" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#7c6cff"/>
            <stop offset="1" stop-color="#5eead4"/>
          </linearGradient>
        </defs>
        <path class="vline" d="M15 5 L26 22 L4 22 Z" stroke="url(#vg3)" stroke-width="1.6" stroke-linejoin="round" fill="none"/>
        <circle class="vnode" cx="15" cy="5" r="2.6" fill="#7c6cff"/>
        <circle class="vnode" cx="26" cy="22" r="2.6" fill="#a196ff"/>
        <circle class="vnode" cx="4" cy="22" r="2.6" fill="#5eead4"/>
      </svg>
    </div>
    <h1>Vertex</h1>
    <p>Powered by Groq · llama-3.3-70b-versatile</p>
    <div class="suggestions">
      <button class="sug-btn" onclick="suggest('Explique como funciona machine learning de forma simples e didática')">
        <div class="sug-icon">🧠</div><div class="sug-title">Explique ML</div><div class="sug-desc">De forma didática</div>
      </button>
      <button class="sug-btn" onclick="suggest('Escreva uma função Python para fazer web scraping com requests e BeautifulSoup')">
        <div class="sug-icon">💻</div><div class="sug-title">Código Python</div><div class="sug-desc">Web scraping</div>
      </button>
      <button class="sug-btn" onclick="suggest('Crie um plano de negócios resumido para um SaaS de gestão de tarefas')">
        <div class="sug-icon">📈</div><div class="sug-title">Plano de negócios</div><div class="sug-desc">SaaS de tarefas</div>
      </button>
      <button class="sug-btn" onclick="suggest('Quais são as melhores práticas de segurança para APIs REST em 2025?')">
        <div class="sug-icon">🔒</div><div class="sug-title">Segurança em APIs</div><div class="sug-desc">Melhores práticas</div>
      </button>
    </div>
  </div>`;
}

function msgHTML(m, idx){
  const isUser = m.role === 'user';
  const t = m.time ? new Date(m.time).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '';
  const tokInfo = m.tokens ? `<span class="msg-tokens">${m.tokens} tokens</span>` : '';
  return `<div class="msg-wrap" id="mw-${idx}">
    <div class="msg">
      <div class="msg-avatar ${m.role}">${isUser ? '👤' : '✦'}</div>
      <div class="msg-body">
        <div class="msg-header">
          <span class="msg-name">${isUser ? 'Você' : 'Vertex'}</span>
          <span class="msg-time">${t}</span>
          ${tokInfo}
        </div>
        <div class="msg-content">${md(m.content)}</div>
        <div class="msg-actions">
          <button class="action-btn" onclick="copyMsg(${idx})">📋 Copiar</button>
          ${!isUser ? `<button class="action-btn" onclick="regen(${idx})">↺ Refazer</button>` : ''}
        </div>
      </div>
    </div>
  </div>`;
}

/* ── MARKDOWN ── */
function md(raw){
  if(!raw) return '';
  let s = esc(raw);
  s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,lang,code) => {
    const l = lang || 'código';
    return `<pre><div class="code-header"><span>${l}</span><button class="copy-code-btn" onclick="copyCode(this)">Copiar</button></div><code>${code.trim()}</code></pre>`;
  });
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/__(.+?)__/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  s = s.replace(/_([^_\n]+)_/g, '<em>$1</em>');
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  s = s.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  s = s.replace(/^---$/gm, '<hr>');
  s = s.replace(/^(\s*)[*\-] (.+)$/gm, '<li>$2</li>');
  s = s.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
  s = s.replace(/<\/ul>\s*<ul>/g, '');
  s = s.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  const lines = s.split('\n');
  const out = []; let buf = [];
  for(const line of lines){
    const t = line.trim();
    if(!t){ if(buf.length){out.push('<p>'+buf.join('<br>')+'</p>');buf=[];} }
    else if(t.startsWith('<h')||t.startsWith('<pre')||t.startsWith('<ul')||t.startsWith('<blockquote')||t.startsWith('<hr')){
      if(buf.length){out.push('<p>'+buf.join('<br>')+'</p>');buf=[];}
      out.push(t);
    } else { buf.push(t); }
  }
  if(buf.length) out.push('<p>'+buf.join('<br>')+'</p>');
  return out.join('');
}

function esc(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

function copyCode(btn){
  const code = btn.closest('pre').querySelector('code');
  navigator.clipboard.writeText(code.textContent).then(()=>{
    btn.textContent='Copiado!';
    setTimeout(()=>btn.textContent='Copiar',2000);
  });
}

/* ── SEND ── */
async function send(){
  if(streaming) return;
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if(!text) return;

  if(!cid) newChat();
  const c = getChat();
  if(!c) return;

  c.messages.push({role:'user', content:text, time:Date.now()});
  if(c.title === 'Novo chat' && text.length > 3){
    c.title = text.slice(0,42) + (text.length > 42 ? '…' : '');
    document.getElementById('chatTitle').textContent = c.title;
  }
  saveChats();
  renderList();
  renderMessages();
  input.value = '';
  input.style.height = 'auto';

  await stream(c);
}

async function stream(c){
  streaming = true;
  abrt = new AbortController();

  const btn = document.getElementById('sendBtn');
  btn.className = 'send-btn stop';
  btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="2" y="2" width="8" height="8" rx="1.5" fill="currentColor"/></svg>';
  btn.onclick = stopStream;
  btn.title = 'Parar';

  const sys = document.getElementById('sysPrompt').value.trim();
  const temp = parseFloat(document.getElementById('tempSlider').value);
  const maxTok = parseInt(document.getElementById('maxTok').value) || 4096;

  const msgs = [];
  if(sys) msgs.push({role:'system', content:sys});
  c.messages.forEach(m => msgs.push({role:m.role, content:m.content}));

  const area = document.getElementById('messages');
  const typDiv = document.createElement('div');
  typDiv.className = 'msg-wrap';
  typDiv.id = 'typing';
  typDiv.innerHTML = `<div class="msg"><div class="msg-avatar assistant">✦</div><div class="msg-body"><div class="msg-header"><span class="msg-name">Vertex</span></div><div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>`;
  area.appendChild(typDiv);
  scrollBottom();

  try{
    const res = await fetch(BACKEND, {
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body: JSON.stringify({
    model: MODEL,
    messages: msgs,
    max_tokens: maxTok,
    temperature: temp,
    stream: true
  }),
  signal: abrt.signal
});

    if(!res.ok){
      let errMsg = res.statusText;
      try{ const j = await res.json(); errMsg = j.error?.message || errMsg; }catch(e){}
      typDiv.remove(); toast('Erro: ' + errMsg); doneStreaming(); return;
    }

    let full = '', totalTokens = 0;
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    typDiv.querySelector('.msg-body').innerHTML = `<div class="msg-header"><span class="msg-name">Vertex</span></div><div class="msg-content" id="sc"></div>`;

    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      const lines = dec.decode(value).split('\n').filter(l => l.startsWith('data: '));
      for(const line of lines){
        const data = line.slice(6);
        if(data === '[DONE]') break;
        try{
          const j = JSON.parse(data);
          const delta = j.choices?.[0]?.delta?.content || '';
          full += delta;
          if(j.usage) totalTokens = j.usage.completion_tokens || 0;
          const sc = document.getElementById('sc');
          if(sc) sc.innerHTML = md(full);
          scrollBottom();
        }catch(e){}
      }
    }

    typDiv.remove();
    c.messages.push({role:'assistant', content:full, time:Date.now(), tokens:totalTokens||undefined});
    saveChats(); renderList(); renderMessages();

  }catch(err){
    typDiv.remove();
    if(err.name !== 'AbortError') toast('Erro de conexão. Verifique a API key.');
    doneStreaming(); return;
  }
  doneStreaming();
}

function stopStream(){ if(abrt){ abrt.abort(); toast('Geração interrompida'); } doneStreaming(); }

function doneStreaming(){
  streaming = false;
  const btn = document.getElementById('sendBtn');
  btn.className = 'send-btn';
  btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M1.5 7.5L13.5 1.5 7.5 13.5 6.5 8z" fill="white"/></svg>';
  btn.onclick = send;
  btn.title = 'Enviar';
}

/* ── ACTIONS ── */
function copyMsg(idx){
  const c = getChat();
  if(!c) return;
  navigator.clipboard.writeText(c.messages[idx]?.content || '').then(()=>toast('Copiado!'));
}
function regen(idx){
  const c = getChat(); if(!c||streaming) return;
  c.messages = c.messages.slice(0,idx); saveChats(); renderMessages(); stream(c);
}
function clearMessages(){
  const c = getChat(); if(!c) return;
  c.messages = []; saveChats(); renderMessages(); toast('Conversa limpa');
}
function exportChat(){
  const c = getChat();
  if(!c||!c.messages.length){ toast('Nenhuma mensagem para exportar'); return; }
  let txt = `# ${c.title}\n*Exportado em ${new Date().toLocaleString('pt-BR')}*\n\n---\n\n`;
  c.messages.forEach(m => { txt += `**${m.role==='user'?'Você':'Vertex 1.6'}**\n\n${m.content}\n\n---\n\n`; });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([txt],{type:'text/markdown'}));
  a.download = c.title.replace(/[^a-z0-9áéíóúâêôãõ\s]/gi,'_').trim()+'.md';
  a.click(); toast('Chat exportado!');
}
function suggest(text){
  if(!cid) newChat();
  document.getElementById('msgInput').value = text;
  send();
}

/* ── HELPERS ── */
function toggleSys(){ document.getElementById('sysPanel').classList.toggle('open') }
function handleKey(e){
  if(!IS_MOBILE && e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }
}
function grow(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}
function scrollBottom(){
  const a = document.getElementById('messages');
  requestAnimationFrame(() => a.scrollTop = a.scrollHeight);
}
function toast(msg){
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}
</script>
</body>
</html>
